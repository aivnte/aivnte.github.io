<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>zaips.com</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
      background-color: #fff;
    }

    .container {
      display: flex;
      justify-content: center; 
      height: 100%;
    }

    .content {
      display: flex;
      flex-direction: column;
      justify-content: center; 
      max-width: 600px; 
      width: 100%; 
      padding: 0 20px; 
      box-sizing: border-box; 
      text-align: left; 
    }

    .center-btn {
      margin-top: 20px; 
    }

    a {
      display: inline-block;
      padding: 10px 20px;
      color: #171717; /* This may change based on your design preference */
      text-decoration: none;
      border: 1px solid rgba(255, 255, 255, 0.2); /* Lighter border for the glass effect */
      border-radius: 50px;
      font-size: 12px;
      transition: background-color 0.3s, color 0.3s;
      background: rgba(192, 192, 192, 0.2); /* Semi-transparent white background */
      backdrop-filter: blur(10px); /* Blur effect for the background */
      box-shadow: 0 4px 6px rgba(87, 87, 87, 0.1); /* Optional: Adds a soft shadow around the button */
    }

  </style>
</head>
<body>
  <div class="container">
    <div class="content">
      <p>Our products serve as virtual brains for businesses, capable of generating high-quality content, understanding complex data, and making informed decisions in real-time.</p>
      <div class="center-btn">
        <a href="white-paper.html">Read the White-Paper</a>
      </div>
    </div>
  </div>
</body>
</html>
