<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAIPS</title>
<style>

  @font-face {
  font-family: 'nhgt';
  src: url('/fonts/nhgt.TTF') format('truetype');
  }

  @font-face {
  font-family: 'nhgm';
  src: url('/fonts/nhgm.TTF') format('truetype');
  }

  body {
    background-color: white;
    font-family: 'nhgt';
    margin: 0;
    padding: 0;
    display: flex; 
    justify-content: center;
    align-items: center; 
    height: 100vh;
    font-size: 12px;
  }

  .container {
    text-align: justify;
    width: 90%;
    max-width: 375px; 
    position: relative;
  }

  .main-text {
    text-align: left;
  }
  
  .button {
    color: black;
    text-decoration: none;
    padding: 4px 9px;
    border: 1px solid black; /* Minimalistic border */
    border-radius: 20px;
    font-family: 'nhgm';
    font-size: 11px;
    margin: 5px 0; /* Adjusted margin for spacing */
    display: inline-block; /* Ensures proper spacing and alignment */
  }

  .button:hover {
    background-color: #f2f2f2; /* Very light grey for hover effect */
  }

</style>
</head>
<body>
    <div class="container">
        <div class="main-text">
            
            <a href="index.html" class="button">Home</a><br>
            
            <p style="font-family: nhgm;">Client "X" is in the E-commerce industry. Our ongoing partnership has been highly successful. Here is the story of how we increased productivity and made cost savings of over $1,000,000 saved every year.</p>

        </div>
    </div>
</body>
</html>
