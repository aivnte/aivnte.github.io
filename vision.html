<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAIPS</title>
    <style>
      @font-face {
        font-family: 'nhgt';
        src: url('/fonts/nhgt.TTF') format('truetype');
      }

      @font-face {
        font-family: 'nhgm';
        src: url('/fonts/nhgm.TTF') format('truetype');
      }

      body {
        min-height: 100vh;
        /* Change from height to min-height */
        margin: 0;
        padding: 0;
        padding-top: 30px;
        padding-bottom: 30px;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        /* Change from center to flex-start */
        font-size: 12px;
        font-family: nhgt;
      }

      .container {
        text-align: justify;
        width: 90%;
        max-width: 375px;
        position: relative;
      }

      .main-text {
        text-align: left;
      }

      .button {
        color: black;
        text-decoration: none;
        padding: 4px 9px;
        border-radius: 20px;
        font-family: 'nhgm';
        font-size: 11px;
        margin: 5px 0;
        display: inline-block;
        transition: transform 0.3s ease, background-color 0.3s ease;
        /* Smooth transition for hover effect */
      }

      .button:hover {
        transform: translateY(-5px);
        /* Move button up slightly on hover */
      }

      @keyframes dropdownFadeIn {
        from {
          opacity: 0;
          transform: translateY(0);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      body * {
        animation: dropdownFadeIn 1s ease-out;
      }

      ::selection {
        background-color: #000000;
        color: #ffffff;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="main-text">
        <a href="index.html" class="button" style="background-color: #a9bcff;">Home</a>
        <br>
        <br>
        <p style="font-family: nhgm;">All processes without AI are inefficient.
        <p>
      </div>
    </div>
  </body>
</html>
